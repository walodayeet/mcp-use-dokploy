<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#0F0F1A" stroke="#6C63FF" stroke-width="2"/>

  <!-- MCP nodes / connection dots -->
  <circle cx="60" cy="28" r="7" fill="#6C63FF"/>
  <circle cx="30" cy="72" r="7" fill="#6C63FF"/>
  <circle cx="90" cy="72" r="7" fill="#6C63FF"/>

  <!-- Connection lines -->
  <line x1="60" y1="28" x2="30" y2="72" stroke="#6C63FF" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="60" y1="28" x2="90" y2="72" stroke="#6C63FF" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="30" y1="72" x2="90" y2="72" stroke="#6C63FF" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Center hub -->
  <circle cx="60" cy="57" r="10" fill="#9A94FF" fill-opacity="0.2" stroke="#9A94FF" stroke-width="1.5"/>
  <circle cx="60" cy="57" r="5" fill="#C4C0FF"/>

  <!-- Glow lines from center to nodes -->
  <line x1="60" y1="57" x2="60" y2="28" stroke="#9A94FF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3 3"/>
  <line x1="60" y1="57" x2="30" y2="72" stroke="#9A94FF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3 3"/>
  <line x1="60" y1="57" x2="90" y2="72" stroke="#9A94FF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3 3"/>

  <!-- Label -->
  <text x="60" y="103" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C4C0FF" text-anchor="middle" letter-spacing="1">MCP USE</text>
</svg>
